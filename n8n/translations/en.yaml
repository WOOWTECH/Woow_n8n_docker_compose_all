configuration:
  N8N_LOG_LEVEL:
    name: Log level
  TZ:
    name: Timezone
    description: The timezone of your n8n instance. This is used to display dates and times correctly. If you don't set this, it defaults to UTC.
  GENERIC_TIMEZONE:
    name: Generic Timezone
    description: The default timezone is America/New_York. For instance, the Schedule node uses it to know at what time the workflow should start.
  N8N_HOST:
    name: Host
    description: The host name or IP address of your n8n instance. If you use Cloudflare Tunnel, set this to your tunnel domain.
  N8N_PATH:
    name: Url path
    description: The path n8n deploys to (default '/')
  WEBHOOK_URL:
    name: Webhook URL
    description: The URL used for webhooks. If using Cloudflare Tunnel, set this to your external HTTPS URL.
  clean_redis:
    name: Clean Redis cache
    description: >-
      This will always start Redis with a clean new db. Use only if you are facing problems that needs cleaning Redis
network:
  5678/tcp: n8n Web UI
