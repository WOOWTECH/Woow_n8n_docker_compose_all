name: woow-n8n-aarch64
services:
  n8n-aarch64:
    image: woowtech/woow-n8n:${VERSION:-latest}-aarch64
    container_name: woow-n8n-aarch64
    ports:
      - 5678:5678
    environment:
      - TZ=Asia/Taipei
    volumes:
      - data:/data
      - ./options.json:/data/options.json:ro
      - config:/config
      - share:/share
      - media:/media
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:5678/healthz | jq -e '.status == \"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  data:
  config:
  share:
  media:
