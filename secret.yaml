---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secrets
  namespace: n8n
  labels:
    app: n8n
type: Opaque
stringData:
  # -- n8n basic auth password (change before deploying)
  N8N_BASIC_AUTH_PASSWORD: "changeme-n8n-password"
  # -- n8n encryption key for credentials stored in the database
  #    Generate with: openssl rand -hex 32
  N8N_ENCRYPTION_KEY: "changeme-generate-with-openssl-rand-hex-32"
  # -- n8n REST API key used by n8n-mcp to communicate with n8n
  #    Generate in n8n UI: Settings > API > Create API Key
  N8N_API_KEY: "changeme-n8n-api-key"
  # -- Bearer token that protects the n8n-mcp HTTP endpoint
  MCP_AUTH_TOKEN: "changeme-mcp-auth-token"
