---
apiVersion: v1
kind: Service
metadata:
  name: n8n-mcp
  namespace: n8n
  labels:
    app: n8n
    component: n8n-mcp
spec:
  type: NodePort
  selector:
    app: n8n
    component: n8n-mcp
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
      nodePort: 30300
