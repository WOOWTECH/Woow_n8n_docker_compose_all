---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-mcp
  namespace: n8n
  labels:
    app: n8n
    component: n8n-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n
      component: n8n-mcp
  template:
    metadata:
      labels:
        app: n8n
        component: n8n-mcp
    spec:
      # ── Wait for n8n to become ready before starting ─────────────
      initContainers:
        - name: wait-for-n8n
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for n8n to be reachable at n8n:5678 ..."
              until wget -q --spider http://n8n:5678/healthz 2>/dev/null; do
                echo "  n8n not ready yet -- retrying in 5s"
                sleep 5
              done
              echo "n8n is up -- starting n8n-mcp"
      containers:
        - name: n8n-mcp
          image: ghcr.io/czlonkowski/n8n-mcp:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # --- from ConfigMap ---
            - name: N8N_MODE
              valueFrom:
                configMapKeyRef:
                  name: n8n-config
                  key: N8N_MODE
            - name: MCP_MODE
              valueFrom:
                configMapKeyRef:
                  name: n8n-config
                  key: MCP_MODE
            - name: N8N_API_URL
              valueFrom:
                configMapKeyRef:
                  name: n8n-config
                  key: N8N_API_URL
            # --- from Secret ---
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_API_KEY
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: MCP_AUTH_TOKEN
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: MCP_AUTH_TOKEN
          # ── Health checks ────────────────────────────────────────
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          # ── Resources ────────────────────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # ── Volume mounts ────────────────────────────────────────
          volumeMounts:
            - name: mcp-logs
              mountPath: /app/logs
      volumes:
        - name: mcp-logs
          persistentVolumeClaim:
            claimName: mcp-logs
